<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAYMOSH PAIR CODE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #0a0a0f;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #13131f;
            border: 1px solid #2a2a3f;
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6e48aa, #9d50bb);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 20px;
            box-shadow: 0 0 30px rgba(157, 80, 187, 0.4);
        }
        h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #9d50bb, #6e48aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px;
        }
        .subtitle {
            color: #666;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .label {
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: #9d50bb;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .input-wrap {
            display: flex;
            align-items: center;
            background: #0d0d18;
            border: 1.5px solid #2a2a3f;
            border-radius: 12px;
            padding: 0 14px;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        .input-wrap:focus-within { border-color: #6e48aa; }
        .input-wrap span { color: #555; font-size: 18px; margin-right: 10px; }
        input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: #fff;
            font-size: 15px;
            padding: 14px 0;
        }
        input::placeholder { color: #444; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6e48aa, #9d50bb);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(110, 72, 170, 0.4);
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .result-box {
            margin-top: 24px;
            background: #0d0d18;
            border: 1px solid #2a2a3f;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        .result-box.show { display: block; }
        .result-label { font-size: 12px; color: #666; margin-bottom: 8px; }
        .code-display {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #9d50bb;
            margin-bottom: 16px;
            word-break: break-all;
        }
        .code-display.error { font-size: 16px; letter-spacing: 1px; color: #e55; }
        .copy-btn {
            padding: 10px 20px;
            width: auto;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .home-link {
            display: inline-block;
            margin-top: 24px;
            color: #555;
            font-size: 13px;
            text-decoration: none;
        }
        .home-link:hover { color: #9d50bb; }
        .notice {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">👾</div>
        <h1>HAYMOSH PAIR CODE</h1>
        <p class="subtitle">Enter your WhatsApp number without + sign</p>

        <div class="label">Phone Number</div>
        <div class="input-wrap">
            <span>💬</span>
            <input type="tel" id="phone" placeholder="e.g. 2349012345678" inputmode="numeric" />
        </div>

        <button id="getBtn" onclick="getCode()">GET CODE</button>

        <div class="result-box" id="resultBox">
            <div class="result-label">Your pairing code is:</div>
            <div class="code-display" id="codeDisplay"></div>
            <button class="copy-btn" id="copyBtn" onclick="copyCode()" style="display:none">
                📋 COPY CODE
            </button>
        </div>

        <p class="notice">
            Enter the code in WhatsApp → Linked Devices → Link with phone number.<br>
            Your Session ID will be sent to your WhatsApp after linking.
        </p>

        <a class="home-link" href="/">← Back to Home</a>
    </div>

    <script>
        let currentCode = '';

        async function getCode() {
            const phone = document.getElementById('phone').value.replace(/\D/g, '');
            if (!phone || phone.length < 7) {
                alert('Please enter a valid phone number');
                return;
            }

            const btn = document.getElementById('getBtn');
            const resultBox = document.getElementById('resultBox');
            const codeDisplay = document.getElementById('codeDisplay');
            const copyBtn = document.getElementById('copyBtn');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Generating...';
            resultBox.classList.remove('show');
            copyBtn.style.display = 'none';

            try {
                const res = await fetch('/code?number=' + phone);
                const data = await res.json();

                resultBox.classList.add('show');

                if (data.code && !data.code.toLowerCase().includes('error') && !data.code.toLowerCase().includes('unavailable')) {
                    currentCode = data.code;
                    codeDisplay.className = 'code-display';
                    codeDisplay.textContent = data.code;
                    copyBtn.style.display = 'inline-flex';
                } else {
                    codeDisplay.className = 'code-display error';
                    codeDisplay.textContent = data.code || 'Service Error';
                }
            } catch (e) {
                resultBox.classList.add('show');
                const codeDisplay = document.getElementById('codeDisplay');
                codeDisplay.className = 'code-display error';
                codeDisplay.textContent = 'Network Error — Please try again';
            }

            btn.disabled = false;
            btn.innerHTML = 'GET CODE';
        }

        function copyCode() {
            if (!currentCode) return;
            navigator.clipboard.writeText(currentCode).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerHTML = '✅ COPIED!';
                setTimeout(() => { btn.innerHTML = '📋 COPY CODE'; }, 2000);
            });
        }

        document.getElementById('phone').addEventListener('keydown', e => {
            if (e.key === 'Enter') getCode();
        });
    </script>
</body>
</html>
